#-------------------------------------------
# InvoiceShelf PostgresSQL docker-compose variant
# Repo : https://github.com/InvoiceShelf/docker
#-------------------------------------------

services:
  database:
    container_name: invoiceshelf-pgsql
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${DATA_DIR}/invoiceshelf-cusec/postgres:/var/lib/postgresql/data
    networks:
      - invoiceshelf
    restart: unless-stopped

  webapp:
    image: invoiceshelf/invoiceshelf:nightly@sha256:5676cf68ba6b33fd597cb71bdd4b50b35960e0e020e927b6e54598a5ebbc657a
    container_name: invoiceshelf-variant-pgsql
    environment:
      - APP_NAME=InvoiceShelf
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL}
      - SESSION_DOMAIN=${SESSION_DOMAIN}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS}
      - DB_CONNECTION=pgsql
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_PASSWORD_FILE=
    volumes:
      - ${DATA_DIR}/invoiceshelf-cusec/storage:/var/www/html/storage/
      - ${DATA_DIR}/invoiceshelf-cusec/modules:/var/www/html/Modules/
    ports:
      - "${PUBLIC_PORT}:8080"
    networks:
      - invoiceshelf
    restart: unless-stopped
    depends_on:
      - database

networks:
  invoiceshelf:
