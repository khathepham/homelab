services:
  actual_server:
    image: docker.io/actualbudget/actual-server:26.4.0
    ports:
      - '5006:5006'
    volumes:
      - ${DATA_DIR}/actual-budget:/data
    restart: unless-stopped

  actual-helpers:
    container_name: actual-helpers
    image: ghcr.io/psybers/actual-helpers:latest@sha256:fbed67fce610b92dc2a74832a2398a9bbc003b10b17d9816bc929fe184d04733
    env_file: .env
    volumes:
      - ${DATA_DIR}/actual-helpers/actual-cache:/usr/src/app/cache
    restart: unless-stopped

  actualtap-py:
    container_name: actualtap-py
    image: ghcr.io/bobokun/actualtap-py:v0.1.9
    ports:
      - 15482:8000
    volumes:
      - ${DATA_DIR}/actual-tap:/config
    restart: unless-stopped

  actual-mcp:
      stdin_open: true
      ports:
          - 3000:3000
      volumes:
          - ${DATA_DIR}/actual-mcp:/data
      environment:
          - ACTUAL_PASSWORD=${ACTUAL_SERVER_PASSWORD}
          - ACTUAL_SERVER_URL=${ACTUAL_SERVER_URL}
          - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_SYNC_ID}
          - BEARER_TOKEN=${BEARER_TOKEN}
      image: sstefanov/actual-mcp:v1.11.2
      command: --sse --enable-write --enable-bearer