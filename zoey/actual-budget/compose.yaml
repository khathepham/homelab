services:
  actual_server:
    image: docker.io/actualbudget/actual-server:26.6.0
    ports:
      - '5006:5006'
    volumes:
      - ${DATA_DIR}/actual-budget:/data
    restart: unless-stopped

  actual-helpers:
    container_name: actual-helpers
    image: ghcr.io/psybers/actual-helpers:latest@sha256:2da0ae8dd03b0de25078ed1fc89777a8e00448699e8650c1173ea4568cb4d7c4
    env_file: .env
    volumes:
      - ${DATA_DIR}/actual-helpers/actual-cache:/usr/src/app/cache
    restart: unless-stopped

  actualtap-py:
    container_name: actualtap-py
    image: ghcr.io/bobokun/actualtap-py:v0.1.9
    ports:
      - 15482:8000
    volumes:
      - ${DATA_DIR}/actual-tap:/config
    restart: unless-stopped