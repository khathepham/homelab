name: Deploy Homelab Services

on:
  push:
    branches: [main]
  workflow_dispatch: 

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build deploy matrix
        id: build-matrix
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          base="$BEFORE_SHA"
          if [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base" 2>/dev/null; then
            # New branch or force-push — diff against main
            git fetch origin main --depth=1
            base=origin/main
          fi

          matrix=$(git diff --name-only --diff-filter=d "$base" "$HEAD_SHA" \
            | grep -E '^(zoey|rumi)/[^/]+/' \
            | awk -F'/' '{print $1 "/" $2}' \
            | sort -u \
            | jq -Rcn '[inputs | split("/") | {host: .[0], service: .[1]}]')

          echo "matrix=${matrix}" >> $GITHUB_OUTPUT
          echo "has_changes=$([ "$matrix" != "[]" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    name: "${{ matrix.stack.host }}: ${{ matrix.stack.service }}"
    concurrency:
      group: deploy-${{ matrix.stack.host }}-${{ matrix.stack.service }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Connect to WireGuard
        shell: bash
        run: |
          sudo apt-get install -y --quiet wireguard resolvconf
          echo "${{ inputs.wg-config }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo cat /etc/wireguard/wg0.conf | sed 's/PrivateKey = .*/PrivateKey = [REDACTED]/'
          sudo wg-quick up wg0


      - uses: ./.github/actions/deploy-stack
        with:
          host: ${{ matrix.stack.host == 'zoey' && secrets.ZOEY_HOST || secrets.RUMI_HOST }}
          username: khathepham
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          wg-config: ${{ secrets.WG_CONFIG }}
          compose-path: ${{ matrix.stack.host }}/${{ matrix.stack.service }}/compose.yaml
