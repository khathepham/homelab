name: Deploy Homelab Services

on:
  push:
    branches: [main]

jobs:

  # ── ZOEY ──────────────────────────────────────────────────────────────────

  deploy-nginx-proxy-manager:
    name: "Zoey: nginx-proxy-manager"
    if: |
      contains(toJSON(github.event.commits.*.modified), 'zoey/nginx-proxy-manager/') ||
      contains(toJSON(github.event.commits.*.added), 'zoey/nginx-proxy-manager/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy-stack
        with:
          host: ${{ secrets.ZOEY_HOST }}
          username: khathepham
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          wg-config: ${{ secrets.WG_CONFIG }}
          compose-path: zoey/nginx-proxy-manager/compose.yaml

