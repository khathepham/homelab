name: Deploy Homelab Services

on:
  pull_request:
    branches: [main]
    types: [closed]
    paths:
      - 'zoey/**/compose.yaml'
      - 'rumi/**/compose.yaml'
  workflow_dispatch:
    inputs:
      host:
        description: "Host to deploy to (zoey or rumi)"
        required: true
        type: choice
        options: [zoey, rumi]
      service:
        description: "Service directory name (e.g. immich, jellyfin)"
        required: true
        type: string

jobs:

  detect-changes:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0

      - name: Build deploy matrix
        id: build-matrix
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          DISPATCH_HOST: ${{ inputs.host }}
          DISPATCH_SERVICE: ${{ inputs.service }}
        run: |
          if [ -n "$DISPATCH_HOST" ] && [ -n "$DISPATCH_SERVICE" ]; then
            # Manual dispatch — deploy the specified service directly
            matrix=$(jq -Rcn '[{host: $ENV.DISPATCH_HOST, service: $ENV.DISPATCH_SERVICE}]')
          else
            matrix=$(git diff --name-only --diff-filter=d "$BASE_SHA" "$HEAD_SHA" \
              | grep -E '^(zoey|rumi)/[^/]+/' \
              | awk -F'/' '{print $1 "/" $2}' \
              | sort -u \
              | jq -Rcn '[inputs | split("/") | {host: .[0], service: .[1]}]')
          fi

          echo "matrix=${matrix}" >> $GITHUB_OUTPUT
          echo "has_changes=$([ "$matrix" != "[]" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    name: "${{ matrix.stack.host }}: ${{ matrix.stack.service }}"
    concurrency:
      group: deploy-${{ matrix.stack.host }}-${{ matrix.stack.service }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
      - uses: ./.github/actions/deploy-stack
        with:
          host: ${{ matrix.stack.host == 'zoey' && secrets.ZOEY_HOST || secrets.RUMI_HOST }}
          username: khathepham
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ts-authkey: ${{ secrets.TS_AUTHKEY }}
          compose-path: ${{ matrix.stack.host }}/${{ matrix.stack.service }}/compose.yaml
