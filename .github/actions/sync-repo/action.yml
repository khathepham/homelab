name: Sync Homelab Repo
description: Connect to the home network via Tailscale and sync ~/homelab to origin/main

inputs:
  host:
    description: Target host IP or hostname
    required: true
  username:
    description: SSH username
    required: true
  ssh-key:
    description: SSH private key
    required: true
  ts-authkey:
    description: Tailscale ephemeral, reusable auth key (tag:ci)
    required: true

runs:
  using: composite
  steps:
    - name: Connect to Tailscale
      uses: tailscale/github-action@v4
      with:
        authkey: ${{ inputs.ts-authkey }}

    - name: Sync repo
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh-key }}
        script: cd ~/homelab && git fetch origin main --prune && git reset --hard origin/main
