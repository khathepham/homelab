name: Deploy Docker Stack
description: Connect to the home network via WireGuard and deploy a docker compose stack

inputs:
  host:
    description: Target host IP or hostname
    required: true
  username:
    description: SSH username
    required: true
  ssh-key:
    description: SSH private key
    required: true
  wg-config:
    description: WireGuard peer configuration
    required: true
  compose-path:
    description: Path to compose.yaml relative to ~/homelab
    required: true

runs:
  using: composite
  steps:
    - name: Connect to WireGuard
      shell: bash
      run: |
        sudo apt-get install -y --quiet wireguard resolvconf
        echo "${{ inputs.wg-config }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
        sudo wg-quick up wg0

    - name: Deploy
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh-key }}
        script: cd ~/homelab && git pull && docker compose -f ${{ inputs.compose-path }} up -d --pull always

    - name: Disconnect from WireGuard
      if: always()
      shell: bash
      run: sudo wg-quick down wg0 || true
