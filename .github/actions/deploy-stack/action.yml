name: Deploy Docker Stack
description: Connect to the home network via Tailscale and deploy a docker compose stack

inputs:
  host:
    description: Target host IP or hostname
    required: true
  username:
    description: SSH username
    required: true
  ssh-key:
    description: SSH private key
    required: true
  ts-oauth-client-id:
    description: Tailscale OAuth client ID
    required: true
  ts-oauth-secret:
    description: Tailscale OAuth client secret
    required: true
  compose-path:
    description: Path to compose.yaml relative to ~/homelab
    required: true

runs:
  using: composite
  steps:
    - name: Connect to Tailscale
      uses: tailscale/github-action@v3
      with:
        oauth-client-id: ${{ inputs.ts-oauth-client-id }}
        oauth-secret: ${{ inputs.ts-oauth-secret }}
        tags: tag:ci
        args: --accept-routes

    - name: Deploy
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh-key }}
        script: cd ~/homelab && git pull --ff-only && docker compose -f ${{ inputs.compose-path }} up -d --pull always
