name: Deploy Docker Stack
description: Connect to the home network via Tailscale and deploy a docker compose stack

inputs:
  host:
    description: Target host IP or hostname
    required: true
  username:
    description: SSH username
    required: true
  ssh-key:
    description: SSH private key
    required: true
  ts-authkey:
    description: Tailscale ephemeral, reusable auth key (tag:ci)
    required: true
  compose-path:
    description: Path to compose.yaml relative to ~/homelab
    required: true

runs:
  using: composite
  steps:
    - name: Connect to Tailscale
      uses: tailscale/github-action@v4
      with:
        authkey: ${{ inputs.ts-authkey }}
        args: --accept-routes

    - name: Deploy
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.ssh-key }}
        script: cd ~/homelab && git fetch origin main --prune && git reset --hard origin/main && docker compose -f ${{ inputs.compose-path }} up -d --pull always
