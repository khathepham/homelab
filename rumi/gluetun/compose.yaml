---
services:
  gluetun:
    image: qmcgaw/gluetun:v3.39.0 # Pinned to this version to avoid issues in v3.40+ specific to protonvpn
    container_name: gluetun
    restart: always
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    privileged: true
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8778:8888/tcp  # HTTP proxy
      - 8001:8000/tcp  # GT Control Server
      - 8080:8080      # QB
      - 6881:6881      # QB
      - 6881:6881/udp  # QB
    volumes:
      - ./data/gluetun:/gluetun:Z
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/forwarded_port
      - TZ=America/New York
      - UPDATER_PERIOD=24h
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24,10.0.0.0/16,172.21.0.0/16
      - DOT_PROVIDERS=cloudflare,google
      - PUBLICIP_API=ip2location
        ### Wireguard Settings
      - VPN_TYPE=wireguard
      - WIREGUARD_PUBLIC_KEY=R0J2HK9bYV4Ww6tMk76hiTwiWbC6JvxqhvSNeO4tIhg=
      - WIREGUARD_PRIVATE_KEY=uGeR5pW8yQj9W7Vxvl8xKORn0TyqUN2Fw+3mFwzkOGU=
      - WIREGUARD_ENDPOINT_IP=151.243.141.5
      - WIREGUARD_ADDRESSES=10.2.0.2/32
      - DNS_ADDRESS=10.2.0.1
      - LOG_LEVEL=debug
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://1.1.1.1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    network_mode: "service:gluetun" #only allowed to use the gluetun network
    container_name: gt-qb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC/UTC
      - WEBUI_PORT=8080
    volumes:
      - ./data/qbittorrent/config:/config:Z
      - /omv:/omv #optional
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy


  gluetun-qbittorrent-port-manager:
    image: snoringdragon/gluetun-qbittorrent-port-manager:latest
    restart: unless-stopped
    container_name: gt-port-manager
    volumes:
      - ./data/gluetun:/tmp/gluetun:Z #Set "yourfolder" to the same directory you used for Gluetun
    network_mode: "service:gluetun"
    environment:
      QBITTORRENT_SERVER: localhost # IP Address of qbittorrent
      QBITTORRENT_PORT: 8080
      QBITTORRENT_USER: admin # username
      QBITTORRENT_PASS: "UZ2s6.e.Ue*nPpZ.Xoe2" # password
      PORT_FORWARDED: /tmp/gluetun/forwarded_port
      HTTP_S: http # Select 'http' or 'https' depending on if you use certificates.
      TZ: "America/New York"
    depends_on:
      gluetun:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-H", "Authorization: $controlServerAuthKey", "-s", "http://localhost:8000/v1/openvpn/status", "|", "grep", "-q", '{"status":"running"}']
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
      


