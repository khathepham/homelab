services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    restart: always
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
    privileged: true
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8778:8888/tcp  # HTTP proxy
      - 8001:8000/tcp  # GT Control Server
      - 8080:8080      # QB
      - 6881:6881      # QB
      - 6881:6881/udp  # QB
    volumes:
      - ./data/gluetun:/gluetun:z
    networks:
      - default
      - arr_default
    env_file: .env
    healthcheck:
      test: [CMD, wget, -qO-, https://1.1.1.1]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4-r2-ls443
    network_mode: service:gluetun
    container_name: gt-qb
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${WEBUI_PORT}
    volumes:
      - ./data/qbittorrent/config:/config:Z
      - /omv:/omv
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy

  gluetun-qbittorrent-port-manager:
    image: snoringdragon/gluetun-qbittorrent-port-manager:1.3
    restart: unless-stopped
    container_name: gt-port-manager
    volumes:
      - ./data/gluetun:/tmp/gluetun:z
    network_mode: service:gluetun
    environment:
      - QBITTORRENT_SERVER=${QBITTORRENT_SERVER}
      - QBITTORRENT_PORT=${QBITTORRENT_PORT}
      - QBITTORRENT_USER=${QBITTORRENT_USER}
      - QBITTORRENT_PASS=${QBITTORRENT_PASS}
      - PORT_FORWARDED=${PORT_FORWARDED}
      - HTTP_S=${HTTP_S}
      - TZ=${TZ}
    depends_on:
      gluetun:
        condition: service_healthy

networks:
  default: {}
  arr_default:
    external: true
