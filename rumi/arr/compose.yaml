services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=
    volumes:
      - ./data/radarr:/config:z
      - /omv/media:/media:z
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=
    volumes:
      - ./data/sonarr:/config:z
      - /omv/media:/media:z
    restart: unless-stopped
    ports:
      - 8989:8989

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=
    volumes:
      - ./data/prowlarr:/config:z
    restart: unless-stopped
    ports:
      - 9696:9696
